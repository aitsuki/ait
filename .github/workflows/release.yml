name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.1"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}"
          }

          if ($version -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Version must use vX.Y.Z format, got '$version'."
            exit 1
          }

          $plainVersion = $version.Substring(1)
          "version=$version" >> $env:GITHUB_OUTPUT
          "plain_version=$plainVersion" >> $env:GITHUB_OUTPUT
          "portable_name=ait-$version-windows.exe" >> $env:GITHUB_OUTPUT
          "setup_name=ait-$version-setup.exe" >> $env:GITHUB_OUTPUT

      - name: Test
        run: cargo test

      - name: Build release executable
        run: cargo build --release

      - name: Prepare portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\ait.exe "dist\${{ steps.version.outputs.portable_name }}"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $env:AIT_VERSION = "${{ steps.version.outputs.plain_version }}"
          $env:AIT_SOURCE_EXE = (Resolve-Path "target\release\ait.exe").Path
          $env:AIT_OUTPUT_DIR = (Resolve-Path "dist").Path
          $env:AIT_OUTPUT_BASE = "ait-${{ steps.version.outputs.version }}-setup"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\ait.iss

      - name: Generate checksums
        shell: pwsh
        run: |
          $portable = "dist\${{ steps.version.outputs.portable_name }}"
          $setup = "dist\${{ steps.version.outputs.setup_name }}"
          Get-FileHash $portable -Algorithm SHA256 | Format-List | Out-String | Set-Content dist\portable.sha256.txt -Encoding UTF8
          Get-FileHash $setup -Algorithm SHA256 | Format-List | Out-String | Set-Content dist\setup.sha256.txt -Encoding UTF8

      - name: Write release notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $setupName = "${{ steps.version.outputs.setup_name }}"
          $portableName = "${{ steps.version.outputs.portable_name }}"
          $portableHash = (Get-FileHash "dist\${{ steps.version.outputs.portable_name }}" -Algorithm SHA256).Hash
          $setupHash = (Get-FileHash "dist\${{ steps.version.outputs.setup_name }}" -Algorithm SHA256).Hash
          $notes = @"
          # ait $version

          Windows-only lightweight selection translator.

          ## Download

          - `$setupName`: recommended for most users.
          - `$portableName`: portable single-file executable.

          ## Checksums

          - `$setupName` SHA256: $setupHash
          - `$portableName` SHA256: $portableHash

          ## Notes

          - Release builds run as a Windows GUI app and no longer open a console window.
          - Windows only.
          - Download from GitHub Releases only.
          - Release artifacts are not code-signed.
          - The built-in no-key Google translation provider may be rate-limited or break.
          - OpenAI-compatible providers can be configured in settings.
          "@
          $notes | Set-Content -Path release-notes.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.version }}"

          gh release view $version --json tagName 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Release '$version' already exists."
            exit 1
          }

          gh release create $version `
            "dist/${{ steps.version.outputs.portable_name }}#${{ steps.version.outputs.portable_name }}" `
            "dist/${{ steps.version.outputs.setup_name }}#${{ steps.version.outputs.setup_name }}" `
            "dist\portable.sha256.txt#portable.sha256.txt" `
            "dist\setup.sha256.txt#setup.sha256.txt" `
            --title "ait $version" `
            --notes-file release-notes.md `
            --target "${{ github.sha }}"
